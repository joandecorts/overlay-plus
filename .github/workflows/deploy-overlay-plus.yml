name: Deploy overlay-plus partial to Nominalia

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["trigger_scrapers"]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'public/banner.html'
      - 'public/index_*.html'
      - 'public/station_list.json'
      - '.github/workflows/deploy-overlay-plus.yml'

concurrency:
  group: deploy-overlay-plus-nominalia
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deploy package
        run: |
          set -euo pipefail
          rm -rf deploy-package
          mkdir -p deploy-package
          cp public/banner.html deploy-package/
          cp public/station_list.json deploy-package/
          find public -maxdepth 1 -type f -name 'index_*.html' -exec cp {} deploy-package/ \;
          echo "Files prepared for deploy:"
          ls -1 deploy-package | sort
          echo "Total files:"
          find deploy-package -maxdepth 1 -type f | wc -l

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Delete old remote files and upload new ones
        run: |
          set -euo pipefail

          lftp -u "${{ secrets.NOMINALIA_FTP_USER }},${{ secrets.NOMINALIA_FTP_PASS }}" "${{ secrets.NOMINALIA_FTP_HOST }}" <<'EOF'
          set cmd:fail-exit yes
          set ftp:ssl-allow no
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 30
          set net:reconnect-interval-base 5
          set xfer:clobber true

          cd /www/ginys/public_html/overlay-plus
          pwd
          cls -1

          glob -a rm -f index_*.html
          rm -f banner.html
          rm -f station_list.json

          lcd deploy-package
          mput *

          bye
          EOF
