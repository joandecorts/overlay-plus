name: Deploy overlay-plus partial to Nominalia

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'public/banner.html'
      - 'public/index_*.html'
      - 'public/station_list.json'
      - '.github/workflows/deploy-overlay-plus.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deploy package
        run: |
          set -e
          rm -rf deploy-package
          mkdir -p deploy-package
          cp public/banner.html deploy-package/
          cp public/station_list.json deploy-package/
          find public -maxdepth 1 -type f -name 'index_*.html' -exec cp {} deploy-package/ \;
          ls -1 deploy-package

      - name: Upload files to Nominalia
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.NOMINALIA_FTP_HOST }}
          username: ${{ secrets.NOMINALIA_FTP_USER }}
          password: ${{ secrets.NOMINALIA_FTP_PASS }}
          port: ${{ secrets.NOMINALIA_FTP_PORT }}
          protocol: ftp
          server-dir: /www/ginys/public_html/overlay-plus/
          local-dir: ./deploy-package/
          state-name: .ftp-deploy-sync-state-overlay-plus.json
